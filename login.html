<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <header class="header">
    <h1>Assistência Inclusiva</h1>
    <nav>
      <a href="#">Serviços</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <div class="container">
    <h2>Login</h2>

    <form>
      <label>Email</label>
      <input type="email" placeholder="Digite seu email" required>

      <label>Senha</label>
      <input type="password" placeholder="Digite sua senha" required>

      <button type="submit">Entrar</button>
    </form>

    <p class="link">
      Não tem conta? <a href="cadastro.html">Cadastre-se</a>
    </p>
  </div>

</body>
</html>
