<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <header class="header">
    <h1>Assistência Inclusiva</h1>
    <nav>
      <a href="#">Serviços</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <div class="container">
    <h2>Cadastro</h2>

    <form>
      <label>Nome</label>
      <input type="text" placeholder="Digite seu nome">

      <label>Email</label>
      <input type="email" placeholder="Digite seu email">

      <label>Senha</label>
      <input type="password" placeholder="Digite sua senha">

      <label>Tipo de Cadastro</label>
      <div class="radio-group">
        <label><input type="radio" name="tipo" value="usuario" checked> Usuário</label>
        <label><input type="radio" name="tipo" value="colaborador"> Colaborador</label>
      </div>

      <button type="submit">Cadastrar</button>
      <p>Já tem um cadastro? <a href="login.html">Faça login</a>
    </form>
  </div>

</body>
</html>
