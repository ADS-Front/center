<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>Assistência Inclusiva</h1>
    <nav>
      <a href="#">Serviços</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <div class="container">
    <h2>Cadastro</h2>

    <form id="formCadastro">

      <label>Nome</label>
      <input type="text" placeholder="Digite seu nome completo" required>

      <label>Email</label>
      <input id="email" type="email" placeholder="Digite seu email" required>

      <label>CPF</label>
      <input type="text" placeholder="Digite seu CPF" required>

      <label>Celular</label>
      <input type="tel" placeholder="Digite seu telefone" required>

      <label>CEP</label>
      <input type="text" placeholder="Digite seu CEP">

      <label>Endereço</label>
      <input type="text" placeholder="Digite seu endereço">

      <label>Bairro</label>
      <input type="text" placeholder="Bairro">

      <label>Estado</label>
      <input type="text" placeholder="Estado">

      <label>Data de Nascimento</label>
      <input type="date" required>
    
      <label>Senha</label>
      <input type="password" id="senha" required minlength="6">

      <label>Confirmar senha</label>
      <input type="password" id="csenha" required>

      <label>Tipo de Cadastro</label>
      <div class="radio-group">
        <label><input type="radio" name="tipo" value="usuario" checked> Usuário</label>
        <label><input type="radio" name="tipo" value="colaborador"> Colaborador</label>
      </div>

      <button type="submit">Cadastrar</button>

      <p class="link">
        Já tem cadastro? <a href="login.html">Faça login</a>
      </p>

    </form>
  </div>

  <script src="index.js"></script>
</body>
</html>
